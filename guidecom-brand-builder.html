<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Guidecom Brand Builder</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Sora:wght@300;400;500;600;700&family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=Manrope:wght@300;400;500;600;700;800&family=DM+Sans:wght@300;400;500;600;700&family=Space+Grotesk:wght@300;400;500;600;700&family=IBM+Plex+Sans:wght@300;400;500;600;700&family=Nunito+Sans:wght@300;400;500;600;700;800&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg: #0B0E14;
    --surface: #12161F;
    --surface2: #1A1F2B;
    --border: rgba(255,255,255,0.07);
    --text: #E8EAED;
    --text-dim: #8B919E;
    --text-muted: #555B69;
    --heading: #ffffff;
    --radius: 14px;
    --radius-btn: 8px;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Outfit', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
    transition: background 0.4s ease, color 0.4s ease;
  }

  /* ===================== HEADER ===================== */
  .header {
    padding: 48px 60px 12px;
    max-width: 1440px;
    margin: 0 auto;
  }
  .header-eyebrow {
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-bottom: 10px;
  }
  .header h2 {
    font-size: 40px;
    font-weight: 800;
    letter-spacing: -1.5px;
    color: var(--heading);
    margin-bottom: 8px;
  }
  .header p {
    font-size: 15px;
    color: var(--text-dim);
    line-height: 1.65;
    max-width: 700px;
  }

  /* ===================== HEADER ACTIONS ===================== */
  .header-actions {
    display: flex;
    gap: 10px;
    margin-top: 16px;
  }
  .btn-share, .btn-export {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 9px 18px;
    border-radius: var(--radius-btn);
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    font-family: 'Outfit', sans-serif;
    letter-spacing: 0.2px;
    transition: all 0.2s ease;
  }
  .btn-share {
    background: var(--accent, #fff);
    color: var(--bg, #0B0E14);
    border: none;
  }
  .btn-share:hover {
    opacity: 0.9;
    transform: translateY(-1px);
  }
  .btn-export {
    background: transparent;
    color: var(--text-dim);
    border: 1px solid var(--border);
  }
  .btn-export:hover {
    border-color: color-mix(in srgb, var(--text) 25%, transparent);
    color: var(--text);
  }
  .toast {
    position: fixed;
    bottom: 32px;
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: var(--surface2, #1A1F2B);
    color: var(--text, #E8EAED);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px 24px;
    font-size: 13px;
    font-weight: 600;
    font-family: 'Outfit', sans-serif;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.3s ease, transform 0.3s ease;
    z-index: 9999;
    box-shadow: 0 8px 32px rgba(0,0,0,0.3);
  }
  .toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }

  /* ===================== PALETTE TABS ===================== */
  .palette-tabs {
    display: flex;
    gap: 8px;
    padding: 32px 60px 0;
    max-width: 1440px;
    margin: 0 auto;
    flex-wrap: wrap;
  }
  .palette-tab {
    padding: 11px 24px;
    border-radius: 100px;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text-dim);
    transition: all 0.25s ease;
    font-family: 'Outfit', sans-serif;
    letter-spacing: 0.3px;
  }
  .palette-tab:hover { border-color: color-mix(in srgb, var(--text) 25%, transparent); color: var(--text); }

  .palette-tab.active { background: var(--accent, #fff); color: var(--bg, #0B0E14); border-color: var(--accent, #fff); }

  /* ===================== MAIN ===================== */
  .main {
    padding: 36px 60px 60px;
    max-width: 1440px;
    margin: 0 auto;
  }

  /* ===================== SECTION ===================== */
  .palette-section { display: none; }
  .palette-section.active { display: block; animation: fadeUp 0.4s ease; }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(12px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .section-header {
    margin-bottom: 32px;
  }
  .section-name {
    font-size: 26px;
    font-weight: 700;
    color: var(--heading);
    letter-spacing: -0.5px;
    margin-bottom: 4px;
  }
  .section-desc {
    font-size: 14px;
    color: var(--text-dim);
  }

  /* ===================== COLOR SWATCHES ===================== */
  .swatches {
    display: flex;
    gap: calc(10px * var(--sp, 1));
    margin-bottom: calc(40px * var(--sp, 1));
  }
  .swatch {
    flex: 1;
    border-radius: var(--radius);
    overflow: hidden;
    border: 1px solid var(--border);
    background: var(--surface);
    transition: transform 0.2s;
  }
  .swatch:hover { transform: translateY(-2px); }
  .swatch-color { height: 80px; }
  .swatch-meta { padding: 12px 14px; }
  .swatch-label {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 1.2px;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-bottom: 3px;
  }
  .swatch-hex {
    font-size: 13px;
    font-weight: 500;
    color: var(--text);
    font-family: 'Sora', monospace;
  }

  /* ===================== CONTROL STRIP ===================== */
  .control-strip {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: calc(20px * var(--sp, 1));
    margin-bottom: calc(36px * var(--sp, 1));
  }
  .control-group {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: calc(20px * var(--sp, 1));
  }
  .control-title {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-bottom: 14px;
  }
  .control-options {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
  }
  .control-btn {
    padding: 8px 16px;
    border-radius: var(--radius-btn);
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text-dim);
    transition: all 0.2s ease;
    font-family: 'Outfit', sans-serif;
    white-space: nowrap;
  }
  .control-btn:hover { border-color: color-mix(in srgb, var(--accent, #fff) 25%, transparent); color: var(--text); }
  .control-btn.active { background: color-mix(in srgb, var(--accent, #fff) 15%, transparent); border-color: color-mix(in srgb, var(--accent, #fff) 40%, transparent); color: var(--accent, #fff); }

  /* ===================== LOGO UPLOAD ===================== */
  .logo-upload-zone {
    border: 2px dashed var(--border);
    border-radius: var(--radius-btn);
    padding: 16px;
    text-align: center;
    cursor: pointer;
    transition: border-color 0.2s ease, background 0.2s ease;
    position: relative;
  }
  .logo-upload-zone:hover {
    border-color: color-mix(in srgb, var(--accent, #fff) 40%, transparent);
    background: color-mix(in srgb, var(--accent, #fff) 5%, transparent);
  }
  .logo-upload-zone.drag-over {
    border-color: var(--accent, #fff);
    background: color-mix(in srgb, var(--accent, #fff) 10%, transparent);
  }
  .logo-upload-hint {
    font-size: 11px;
    color: var(--text-muted);
    line-height: 1.5;
  }
  .logo-upload-hint strong {
    color: var(--text-dim);
  }
  .logo-upload-input {
    position: absolute;
    inset: 0;
    opacity: 0;
    cursor: pointer;
  }
  .logo-preview-wrap {
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .logo-preview-thumb {
    max-width: 80px;
    max-height: 40px;
    border-radius: 4px;
    object-fit: contain;
  }
  .logo-remove-btn {
    font-size: 11px;
    font-weight: 600;
    color: var(--text-dim);
    background: none;
    border: 1px solid var(--border);
    border-radius: var(--radius-btn);
    padding: 4px 10px;
    cursor: pointer;
    font-family: 'Outfit', sans-serif;
    transition: all 0.2s ease;
  }
  .logo-remove-btn:hover {
    border-color: #e74c3c;
    color: #e74c3c;
  }

  /* ===================== PREVIEW GRID ===================== */
  .preview-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: calc(20px * var(--sp, 1));
    margin-bottom: 20px;
  }
  .preview-card {
    border-radius: var(--radius);
    overflow: hidden;
    border: 1px solid var(--border);
    transition: transform 0.2s;
  }
  .preview-card:hover { transform: translateY(-2px); }
  .preview-label {
    padding: 12px 18px;
    background: var(--surface);
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--text-muted);
    border-bottom: 1px solid var(--border);
  }
  .preview-body {
    padding: calc(36px * var(--sp, 1));
    display: flex;
    flex-direction: column;
    gap: calc(18px * var(--sp, 1));
    min-height: 240px;
    position: relative;
    overflow: hidden;
  }

  /* Logo */
  .logo-text {
    font-weight: 800;
    font-size: 30px;
    letter-spacing: -1px;
  }
  .tagline-text {
    font-size: 13px;
    font-weight: 400;
    letter-spacing: 0.3px;
  }

  /* Buttons */
  .btn-row { display: flex; gap: 10px; align-items: center; }
  .pbtn {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 10px 20px;
    border-radius: var(--radius-btn);
    font-size: 13px;
    font-weight: 600;
    border: none;
    cursor: pointer;
    width: fit-content;
    font-family: inherit;
    letter-spacing: 0.2px;
  }
  .pbtn-outline {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 9px 19px;
    border-radius: var(--radius-btn);
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    width: fit-content;
    font-family: inherit;
    background: transparent;
    letter-spacing: 0.2px;
  }

  /* Stat */
  .stat-num {
    font-size: 52px;
    font-weight: 800;
    letter-spacing: -2px;
    line-height: 1;
  }
  .stat-label {
    font-size: 12px;
    font-weight: 500;
    line-height: 1.5;
  }
  .body-text {
    font-size: 14px;
    line-height: 1.7;
    max-width: 480px;
  }
  .heading-text {
    font-size: 24px;
    font-weight: 700;
    letter-spacing: -0.3px;
    line-height: 1.3;
  }

  /* Social icon */
  .social-icon {
    width: 44px;
    height: 44px;
    border-radius: var(--radius-icon, 11px);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 20px;
    font-weight: 800;
  }
  .social-center {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    gap: 14px;
    min-height: 240px;
  }

  /* Email button sizing override */
  .email-btn-wrap .pbtn,
  .email-btn-wrap .pbtn-outline {
    font-size: 12px;
    padding: 8px 18px;
  }

  /* Full width */
  .full-width { grid-column: 1 / -1; }

  /* ===================== ARTWORK OVERLAYS ===================== */
  /* Line art */
  .art-lines::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    opacity: 0.07;
    background:
      repeating-linear-gradient(90deg, currentColor 0px, currentColor 1px, transparent 1px, transparent 60px),
      repeating-linear-gradient(0deg, currentColor 0px, currentColor 1px, transparent 1px, transparent 60px);
    pointer-events: none;
  }

  /* Geometric */
  .art-geo::before {
    content: '';
    position: absolute;
    top: -20%; right: -10%;
    width: 300px; height: 300px;
    border-radius: 50%;
    opacity: 0.08;
    background: radial-gradient(circle, currentColor 0%, transparent 70%);
    pointer-events: none;
  }
  .art-geo::after {
    content: '';
    position: absolute;
    bottom: -30%; left: -5%;
    width: 200px; height: 200px;
    border: 2px solid currentColor;
    border-radius: 50%;
    opacity: 0.06;
    pointer-events: none;
  }

  /* Gradient mesh */
  .art-mesh::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    opacity: 0.12;
    background:
      radial-gradient(ellipse at 20% 50%, currentColor 0%, transparent 50%),
      radial-gradient(ellipse at 80% 20%, currentColor 0%, transparent 40%);
    pointer-events: none;
  }

  /* Dots */
  .art-dots::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    opacity: 0.06;
    background-image: radial-gradient(circle, currentColor 1px, transparent 1px);
    background-size: 20px 20px;
    pointer-events: none;
  }

  /* Noise grain */
  .art-grain::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    opacity: 0.04;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
    background-size: 128px;
    pointer-events: none;
  }

  /* ===================== MOTION CLASSES ===================== */
  .motion-fade .preview-body > * {
    opacity: 0;
    transform: translateY(16px);
  }
  .motion-fade.animate .preview-body > * {
    animation: motionFade 0.6s ease forwards;
  }
  .motion-fade.animate .preview-body > *:nth-child(1) { animation-delay: 0s; }
  .motion-fade.animate .preview-body > *:nth-child(2) { animation-delay: 0.1s; }
  .motion-fade.animate .preview-body > *:nth-child(3) { animation-delay: 0.2s; }
  .motion-fade.animate .preview-body > *:nth-child(4) { animation-delay: 0.3s; }

  @keyframes motionFade {
    to { opacity: 1; transform: translateY(0); }
  }

  .motion-scale .preview-body > * {
    opacity: 0;
    transform: scale(0.92);
  }
  .motion-scale.animate .preview-body > * {
    animation: motionScale 0.5s cubic-bezier(0.2, 0, 0.1, 1) forwards;
  }
  .motion-scale.animate .preview-body > *:nth-child(1) { animation-delay: 0s; }
  .motion-scale.animate .preview-body > *:nth-child(2) { animation-delay: 0.08s; }
  .motion-scale.animate .preview-body > *:nth-child(3) { animation-delay: 0.16s; }
  .motion-scale.animate .preview-body > *:nth-child(4) { animation-delay: 0.24s; }

  @keyframes motionScale {
    to { opacity: 1; transform: scale(1); }
  }

  .motion-slide .preview-body > * {
    opacity: 0;
    transform: translateX(-24px);
  }
  .motion-slide.animate .preview-body > * {
    animation: motionSlide 0.5s ease forwards;
  }
  .motion-slide.animate .preview-body > *:nth-child(1) { animation-delay: 0s; }
  .motion-slide.animate .preview-body > *:nth-child(2) { animation-delay: 0.1s; }
  .motion-slide.animate .preview-body > *:nth-child(3) { animation-delay: 0.18s; }
  .motion-slide.animate .preview-body > *:nth-child(4) { animation-delay: 0.26s; }

  @keyframes motionSlide {
    to { opacity: 1; transform: translateX(0); }
  }

  .motion-none .preview-body > * {
    opacity: 1 !important;
    transform: none !important;
    animation: none !important;
  }

  /* ===================== TYPOGRAPHY PREVIEW ===================== */
  .type-showcase {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 28px;
    display: flex;
    flex-direction: column;
    gap: 20px;
    margin-bottom: 20px;
  }
  .type-row {
    display: flex;
    flex-direction: column;
    gap: 4px;
  }
  .type-label {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--text-muted);
  }
  .type-sample {
    color: var(--heading);
    letter-spacing: -0.3px;
  }

  /* ===================== SUMMARY BAR ===================== */
  .summary-bar {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 24px 28px;
    margin-top: 12px;
    display: flex;
    align-items: center;
    gap: 32px;
    flex-wrap: wrap;
  }
  .summary-item {
    display: flex;
    flex-direction: column;
    gap: 3px;
  }
  .summary-key {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 1.2px;
    text-transform: uppercase;
    color: var(--text-muted);
  }
  .summary-val {
    font-size: 14px;
    font-weight: 600;
    color: var(--heading);
  }

  /* ===================== SMOOTH TRANSITIONS ===================== */
  .control-group,
  .swatch,
  .type-showcase,
  .summary-bar,
  .preview-card,
  .preview-label {
    transition: background 0.3s ease, border-color 0.3s ease, color 0.3s ease;
  }

  /* ===================== RESPONSIVE ===================== */
  @media (max-width: 1200px) {
    .control-strip { grid-template-columns: repeat(2, 1fr); }
  }

  @media (max-width: 1000px) {
    .header, .palette-tabs, .main { padding-left: 24px; padding-right: 24px; }
    .preview-grid { grid-template-columns: 1fr; }
    .swatches { flex-wrap: wrap; }
    .swatch { min-width: calc(33% - 8px); }
    .header h2 { font-size: 30px; }
    .full-width { grid-column: 1; }
    .summary-bar { flex-direction: column; align-items: flex-start; gap: 16px; }
  }

  @media (max-width: 600px) {
    .control-strip { grid-template-columns: 1fr; }
    .swatch { min-width: calc(50% - 6px); }
    .palette-tabs { gap: 6px; }
    .palette-tab { padding: 9px 16px; font-size: 12px; }
  }
</style>
</head>
<body>

<div class="header">
  <div class="header-eyebrow">Guidecom</div>
  <h2>Brand Builder</h2>
  <p>Pick a color direction, then mix and match typography, artwork, and motion until it feels right. Everything updates live.</p>
  <div class="header-actions">
    <button class="btn-share" onclick="shareLink()">Share Brand Guide</button>
    <button class="btn-export" onclick="exportBrandGuide()">Export as PDF</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<div class="palette-tabs" id="paletteTabs"></div>

<div class="main" id="mainContent"></div>

// ============================================================
// THEME
// ============================================================
function applyTheme() {
  const p = palettes[state.palette];
  const accentObj = p.accentOptions[state.accent] || p.accentOptions[0];
  const root = document.documentElement;

  root.style.setProperty('--bg', p.pageBg);
  root.style.setProperty('--surface', p.pageSurface);
  root.style.setProperty('--surface2', p.pageSurface2);
  root.style.setProperty('--border', p.pageBorder);
  root.style.setProperty('--text', p.pageText);
  root.style.setProperty('--text-dim', p.pageTextDim);
  root.style.setProperty('--text-muted', p.pageTextMuted);
  root.style.setProperty('--heading', p.pageHeading);
  root.style.setProperty('--accent', accentObj.value);
  root.style.setProperty('--accent-dark', accentObj.dark);

  const rad = radiusOptions[state.radius];
  const sp = spacingOptions[state.spacing];
  root.style.setProperty('--radius', rad.card);
  root.style.setProperty('--radius-btn', rad.btn);
  root.style.setProperty('--radius-icon', rad.icon);
  root.style.setProperty('--sp', sp.multiplier);
}

// ============================================================
// BUTTON STYLE RENDERING HELPER
// ============================================================
function renderBtn(text, accent, accentDark, darkBg, fontFamily, isPrimary) {
  const bs = buttonOptions[state.button].style;
  const rad = radiusOptions[state.radius].btn;
  let style = `font-family: ${fontFamily}; border-radius: ${rad};`;

  if (isPrimary) {
    switch (bs) {
      case 'filled':
        style += `background: ${accent}; color: ${darkBg}; border: none;`;
        break;
      case 'outlined':
        style += `background: transparent; color: ${accent}; border: 2px solid ${accent};`;
        break;
      case 'ghost':
        style += `background: transparent; color: ${accent}; border: none; text-decoration: underline; text-underline-offset: 3px;`;
        break;
      case 'gradient':
        style += `background: linear-gradient(135deg, ${accent}, ${accentDark}); color: ${darkBg}; border: none;`;
        break;
    }
    return `<div class="pbtn" style="${style}">${text}</div>`;
  } else {
    switch (bs) {
      case 'filled':
        style += `background: transparent; border: 1.5px solid ${accent}44; color: ${accent};`;
        break;
      case 'outlined':
        style += `background: transparent; border: 1.5px solid ${accent}; color: ${accent};`;
        break;
      case 'ghost':
        style += `background: transparent; border: none; color: ${accent}; opacity: 0.7;`;
        break;
      case 'gradient':
        style += `background: transparent; border: 1.5px solid ${accent}44; color: ${accent};`;
        break;
    }
    return `<div class="pbtn-outline" style="${style}">${text}</div>`;
  }
}

// ============================================================
// ICON STYLE RENDERING HELPER
// ============================================================
function renderIcon(size, accent, bgColor, fontFamily) {
  const iconStyle = iconOptions[state.icon].style;
  const rad = radiusOptions[state.radius].icon;
  const s = parseInt(size);

  if (iconStyle === 'outlined') {
    return `<div style="width: ${s}px; height: ${s}px; border-radius: ${rad}; border: 2px solid ${accent}; display: flex; align-items: center; justify-content: center;">
      <svg width="${s*0.45}" height="${s*0.45}" viewBox="0 0 24 24" fill="none" stroke="${accent}" stroke-width="2" stroke-linecap="round"><path d="M9 3H5a2 2 0 00-2 2v4m6-6h10a2 2 0 012 2v4M9 3v18m0 0h10a2 2 0 002-2V9M9 21H5a2 2 0 01-2-2V9m0 0h18"/></svg>
    </div>`;
  } else if (iconStyle === 'solid') {
    return `<div style="width: ${s}px; height: ${s}px; border-radius: ${rad}; background: ${accent}; color: ${bgColor}; display: flex; align-items: center; justify-content: center; font-family: ${fontFamily}; font-size: ${s*0.5}px; font-weight: 800;">G</div>`;
  } else {
    return `<div style="width: ${s}px; height: ${s}px; border-radius: ${rad}; background: ${accent}22; display: flex; align-items: center; justify-content: center;">
      <svg width="${s*0.45}" height="${s*0.45}" viewBox="0 0 24 24" fill="${accent}33" stroke="${accent}" stroke-width="2" stroke-linecap="round"><path d="M9 3H5a2 2 0 00-2 2v4m6-6h10a2 2 0 012 2v4M9 3v18m0 0h10a2 2 0 002-2V9M9 21H5a2 2 0 01-2-2V9m0 0h18"/></svg>
    </div>`;
  }
}

}

function setAccent(i) { state.accent = i; render(); }
function setType(i) { state.type = i; render(); }
function setArt(i) { state.art = i; render(); }
function setMotion(i) { state.motion = i; render(); }
function setRadius(i) { state.radius = i; render(); }
function setSpacing(i) { state.spacing = i; render(); }
function setIcon(i) { state.icon = i; render(); }
function setButton(i) { state.button = i; render(); }

function replayMotion() {
  const mot = motionOptions[state.motion];
  if (mot.cls === 'motion-none') return;
  document.querySelectorAll(`.${mot.cls}`).forEach(el => {
    el.classList.remove('animate');
  });
  requestAnimationFrame(() => {
    requestAnimationFrame(() => {
      document.querySelectorAll(`.${mot.cls}`).forEach(el => {
        el.classList.add('animate');
      });
    });
  });
}

function handleLogoUpload(event) {
  const file = event.target.files && event.target.files[0];
  if (!file) return;
  if (!file.type.startsWith('image/')) return;

  const reader = new FileReader();
  reader.onload = function(e) {
    const img = new Image();
    img.onload = function() {
      const maxW = 200;
      let w = img.width;
      let h = img.height;
      if (w > maxW) {
        h = Math.round(h * (maxW / w));
        w = maxW;
      }
      const canvas = document.createElement('canvas');
      canvas.width = w;
      canvas.height = h;
      const ctx = canvas.getContext('2d');
      ctx.drawImage(img, 0, 0, w, h);
      state.logo = canvas.toDataURL('image/png');
      render();
    };
    img.src = e.target.result;
  };
  reader.readAsDataURL(file);
}

function removeLogo() {
  state.logo = null;
  render();
}

function initLogoDragDrop() {
  const zone = document.querySelector('.logo-upload-zone');
  if (!zone) return;
  zone.addEventListener('dragover', (e) => {
    e.preventDefault();
    zone.classList.add('drag-over');
  });
  zone.addEventListener('dragleave', () => {
    zone.classList.remove('drag-over');
  });
  zone.addEventListener('drop', (e) => {
    e.preventDefault();
    zone.classList.remove('drag-over');
    const file = e.dataTransfer.files && e.dataTransfer.files[0];
    if (!file || !file.type.startsWith('image/')) return;
    // Reuse the same resize + store logic
    const reader = new FileReader();
    reader.onload = function(ev) {
      const img = new Image();
      img.onload = function() {
        const maxW = 200;
        let w = img.width, h = img.height;
        if (w > maxW) { h = Math.round(h * (maxW / w)); w = maxW; }
        const canvas = document.createElement('canvas');
        canvas.width = w; canvas.height = h;
        canvas.getContext('2d').drawImage(img, 0, 0, w, h);
        state.logo = canvas.toDataURL('image/png');
        render();
      };
      img.src = ev.target.result;
    };
    reader.readAsDataURL(file);
  });
}

// ============================================================
// URL STATE & SHARING
// ============================================================
function encodeStateToParams() {
  const params = new URLSearchParams();
  params.set('p', state.palette);
  params.set('a', state.accent);
  params.set('t', state.type);
  params.set('ar', state.art);
  params.set('m', state.motion);
  params.set('r', state.radius);
  params.set('s', state.spacing);
  params.set('i', state.icon);
  params.set('b', state.button);
  if (state.logo) {
    params.set('logo', state.logo);
  }
  return params.toString();
}

function decodeStateFromParams() {
  const params = new URLSearchParams(window.location.search);
  if (!params.has('p')) return; // no state in URL
  const safeInt = (key, fallback, max) => {
    const v = parseInt(params.get(key));
    return (isNaN(v) || v < 0 || v >= max) ? fallback : v;
  };
  state.palette = safeInt('p', 0, palettes.length);
  state.accent = safeInt('a', 0, palettes[state.palette].accentOptions.length);
  state.type = safeInt('t', 0, typographyOptions.length);
  state.art = safeInt('ar', 0, artworkOptions.length);
  state.motion = safeInt('m', 0, motionOptions.length);
  state.radius = safeInt('r', 2, radiusOptions.length);
  state.spacing = safeInt('s', 1, spacingOptions.length);
  state.icon = safeInt('i', 0, iconOptions.length);
  state.button = safeInt('b', 0, buttonOptions.length);
  if (params.get('logo')) {
    state.logo = params.get('logo');
  }
}

function shareLink() {
  const params = encodeStateToParams();
  const url = window.location.origin + '/brand?' + params;
  navigator.clipboard.writeText(url).then(() => {
    showToast('Link copied!');
  }).catch(() => {
    // Fallback: select from a temporary input
    const tmp = document.createElement('input');
    tmp.value = url;
    document.body.appendChild(tmp);
    tmp.select();
    document.execCommand('copy');
    document.body.removeChild(tmp);
    showToast('Link copied!');
  });
}

function exportBrandGuide() {
  const params = encodeStateToParams();
  const base = window.location.origin + '/brand';
  const url = base + '?' + params;
  window.open(url, '_blank');
}

function showToast(msg) {
  const toast = document.getElementById('toast');
  toast.textContent = msg;
  toast.classList.add('show');
  setTimeout(() => {
    toast.classList.remove('show');
  }, 2500);
}
