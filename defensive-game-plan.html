<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Defensive Game Plan — Guidecom</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');

  /* ===== CSS Custom Properties ===== */
  :root {
    --bg: #0F1219;
    --surface: #161B25;
    --surface2: #1E2433;
    --border: rgba(255,255,255,0.08);
    --text: #E2E5EB;
    --text-dim: #8891A0;
    --text-muted: #555D6E;
    --heading: #ffffff;
    --crimson: #CC1735;
    --gold: #CFB87C;
    --crimson-glow: rgba(204,23,53,0.15);
    --radius: 12px;
  }

  /* ===== Global Reset ===== */
  *, *::before, *::after {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    min-height: 100vh;
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
  }

  /* ===== Scrollbar ===== */
  ::-webkit-scrollbar { width: 8px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--surface2); border-radius: 4px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--text-muted); }

  /* ===== Header ===== */
  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 16px 32px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .header-title {
    font-size: 16px;
    font-weight: 700;
    color: var(--heading);
    letter-spacing: -0.01em;
  }

  .header-title span {
    color: var(--crimson);
  }

  .header-actions {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  /* ===== Progress Bar ===== */
  .progress-bar {
    display: flex;
    align-items: flex-start;
    justify-content: center;
    gap: 0;
    padding: 32px 40px 24px;
    max-width: 720px;
    margin: 0 auto;
  }

  .progress-step {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
    position: relative;
    z-index: 1;
    flex-shrink: 0;
  }

  .progress-step-circle {
    width: 36px;
    height: 36px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 14px;
    font-weight: 600;
    background: var(--surface2);
    color: var(--text-muted);
    border: 2px solid var(--border);
    transition: all 0.3s ease;
  }

  .progress-step-label {
    font-size: 11px;
    font-weight: 500;
    color: var(--text-muted);
    text-align: center;
    white-space: nowrap;
    transition: color 0.3s ease;
  }

  .progress-step.active .progress-step-circle {
    background: var(--crimson);
    border-color: var(--crimson);
    color: #fff;
    box-shadow: 0 0 16px var(--crimson-glow);
  }

  .progress-step.active .progress-step-label {
    color: var(--text);
  }

  .progress-step.visited .progress-step-circle {
    background: transparent;
    border-color: var(--gold);
    color: var(--gold);
    cursor: pointer;
  }

  .progress-step.visited .progress-step-label {
    color: var(--text-dim);
    cursor: pointer;
  }

  .progress-step.visited:hover .progress-step-circle {
    background: rgba(207, 184, 124, 0.1);
  }

  .progress-line {
    flex: 1;
    height: 2px;
    background: var(--border);
    margin-top: 18px;
    min-width: 32px;
    transition: background 0.3s ease;
  }

  .progress-line.visited {
    background: var(--gold);
  }

  /* ===== Wizard Container ===== */
  .wizard-container {
    max-width: 900px;
    margin: 0 auto;
    padding: 0 40px 60px;
  }

  .step-panel {
    display: none;
  }

  .step-panel.active {
    display: block;
    animation: fadeUp 0.35s ease forwards;
  }

  .step-title {
    font-size: 28px;
    font-weight: 700;
    color: var(--heading);
    margin-bottom: 6px;
    letter-spacing: -0.02em;
  }

  .step-subtitle {
    font-size: 15px;
    color: var(--text-dim);
    margin-bottom: 32px;
    line-height: 1.5;
  }

  /* ===== Navigation Buttons ===== */
  .nav-buttons {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding-top: 32px;
    margin-top: 24px;
    border-top: 1px solid var(--border);
  }

  .nav-buttons-right {
    display: flex;
    gap: 10px;
    margin-left: auto;
  }

  /* ===== Buttons ===== */
  .btn-next {
    background: var(--crimson);
    color: #fff;
    font-size: 14px;
    font-weight: 600;
    padding: 12px 32px;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    transition: all 0.2s ease;
    font-family: inherit;
    letter-spacing: -0.01em;
  }

  .btn-next:hover {
    background: #E01E3D;
    box-shadow: 0 4px 16px var(--crimson-glow);
  }

  .btn-next:active {
    transform: scale(0.98);
  }

  .btn-back {
    background: transparent;
    color: var(--text-dim);
    font-size: 14px;
    font-weight: 500;
    padding: 12px 32px;
    border: 1px solid var(--border);
    border-radius: 8px;
    cursor: pointer;
    transition: all 0.2s ease;
    font-family: inherit;
  }

  .btn-back:hover {
    border-color: rgba(255,255,255,0.15);
    color: var(--text);
    background: rgba(255,255,255,0.03);
  }

  .btn-save {
    background: var(--crimson);
    color: #fff;
    font-size: 14px;
    font-weight: 600;
    padding: 14px 40px;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    transition: all 0.2s ease;
    font-family: inherit;
    letter-spacing: -0.01em;
  }

  .btn-save:hover {
    background: #E01E3D;
    box-shadow: 0 4px 20px var(--crimson-glow);
  }

  .btn-save:active {
    transform: scale(0.98);
  }

  .btn-ghost {
    background: transparent;
    color: var(--text-dim);
    font-size: 13px;
    font-weight: 500;
    padding: 10px 20px;
    border: 1px solid var(--border);
    border-radius: 8px;
    cursor: pointer;
    transition: all 0.2s ease;
    font-family: inherit;
  }

  .btn-ghost:hover {
    border-color: rgba(255,255,255,0.15);
    color: var(--text);
    background: rgba(255,255,255,0.03);
  }

  .btn-danger {
    background: transparent;
    color: #E04A5A;
    font-size: 13px;
    font-weight: 500;
    padding: 10px 20px;
    border: 1px solid rgba(224, 74, 90, 0.25);
    border-radius: 8px;
    cursor: pointer;
    transition: all 0.2s ease;
    font-family: inherit;
  }

  .btn-danger:hover {
    background: rgba(224, 74, 90, 0.08);
    border-color: rgba(224, 74, 90, 0.4);
  }

  /* ===== Card Selector ===== */
  .card-selector {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 12px;
  }

  .card {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 20px;
    cursor: pointer;
    transition: all 0.2s ease;
    position: relative;
  }

  .card:hover {
    border-color: rgba(255,255,255,0.15);
    transform: translateY(-1px);
    filter: brightness(1.05);
  }

  .card.selected {
    border-color: var(--crimson);
    box-shadow: 0 0 20px var(--crimson-glow), inset 0 0 0 1px var(--crimson);
  }

  .card-title {
    font-size: 15px;
    font-weight: 600;
    color: var(--heading);
    margin-bottom: 4px;
  }

  .card-desc {
    font-size: 13px;
    color: var(--text-dim);
    line-height: 1.45;
  }

  .card-icon {
    font-size: 22px;
    margin-bottom: 10px;
  }

  /* ===== Chips ===== */
  .chip-group {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
  }

  .chip {
    display: inline-flex;
    align-items: center;
    padding: 8px 16px;
    border-radius: 100px;
    background: var(--surface2);
    border: 1px solid var(--border);
    font-size: 13px;
    font-weight: 500;
    color: var(--text-dim);
    cursor: pointer;
    transition: all 0.2s ease;
    font-family: inherit;
    user-select: none;
  }

  .chip:hover {
    border-color: rgba(255,255,255,0.15);
    color: var(--text);
  }

  .chip.selected {
    background: var(--gold);
    border-color: var(--gold);
    color: #1a1a1a;
    font-weight: 600;
  }

  .chip-custom {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 8px 12px;
    border-radius: 100px;
    background: var(--surface2);
    border: 1px solid var(--border);
    font-size: 13px;
    color: var(--text-dim);
    cursor: pointer;
    transition: all 0.2s ease;
  }

  .chip-custom input {
    background: transparent;
    border: none;
    outline: none;
    color: var(--text);
    font-size: 13px;
    font-family: inherit;
    width: 80px;
  }

  .chip-custom input::placeholder {
    color: var(--text-muted);
  }

  /* ===== Player Rows ===== */
  .player-row {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px;
    margin-bottom: 8px;
    display: flex;
    flex-direction: column;
    gap: 12px;
    transition: border-color 0.2s ease;
  }

  .player-row:hover {
    border-color: rgba(255,255,255,0.12);
  }

  .player-row-header {
    display: flex;
    flex-direction: row;
    align-items: center;
    gap: 10px;
  }

  .player-row-header .input-field {
    flex: 1;
  }

  .player-row-number {
    width: 60px;
    flex-shrink: 0;
  }

  .player-row-position {
    width: 100px;
    flex-shrink: 0;
  }

  .player-row-remove {
    background: none;
    border: none;
    color: var(--text-muted);
    font-size: 18px;
    cursor: pointer;
    padding: 4px 8px;
    border-radius: 4px;
    transition: all 0.2s ease;
    flex-shrink: 0;
  }

  .player-row-remove:hover {
    color: #E04A5A;
    background: rgba(224, 74, 90, 0.08);
  }

  .player-add-btn {
    display: flex;
    align-items: center;
    justify-content: center;
    width: 100%;
    padding: 14px;
    background: var(--surface);
    border: 2px dashed var(--border);
    border-radius: var(--radius);
    color: var(--text-muted);
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.2s ease;
    font-family: inherit;
    gap: 8px;
  }

  .player-add-btn:hover {
    border-color: rgba(255,255,255,0.15);
    color: var(--text-dim);
    background: var(--surface2);
  }

  /* ===== Matchup Rows ===== */
  .matchup-row {
    display: flex;
    flex-direction: row;
    align-items: center;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px;
    gap: 14px;
    margin-bottom: 8px;
    transition: border-color 0.2s ease;
  }

  .matchup-row:hover {
    border-color: rgba(255,255,255,0.12);
  }

  .matchup-vs {
    color: var(--text-muted);
    font-size: 12px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    flex-shrink: 0;
  }

  /* ===== Form Fields ===== */
  .input-field {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 14px;
    color: var(--text);
    font-size: 14px;
    font-family: inherit;
    outline: none;
    transition: all 0.2s ease;
    width: 100%;
  }

  .input-field::placeholder {
    color: var(--text-muted);
  }

  .input-field:focus {
    border-color: var(--crimson);
    box-shadow: 0 0 0 3px var(--crimson-glow);
  }

  .textarea-field {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 14px;
    color: var(--text);
    font-size: 14px;
    font-family: inherit;
    outline: none;
    transition: all 0.2s ease;
    width: 100%;
    min-height: 80px;
    resize: vertical;
    line-height: 1.5;
  }

  .textarea-field::placeholder {
    color: var(--text-muted);
  }

  .textarea-field:focus {
    border-color: var(--crimson);
    box-shadow: 0 0 0 3px var(--crimson-glow);
  }

  .select-field {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 14px;
    color: var(--text);
    font-size: 14px;
    font-family: inherit;
    outline: none;
    transition: all 0.2s ease;
    width: 100%;
    cursor: pointer;
    -webkit-appearance: none;
    -moz-appearance: none;
    appearance: none;
    background-image: url("data:image/svg+xml,%3Csvg width='10' height='6' viewBox='0 0 10 6' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M1 1L5 5L9 1' stroke='%238891A0' stroke-width='1.5' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/svg%3E");
    background-repeat: no-repeat;
    background-position: right 14px center;
    padding-right: 36px;
  }

  .select-field:focus {
    border-color: var(--crimson);
    box-shadow: 0 0 0 3px var(--crimson-glow);
  }

  .select-field option {
    background: var(--surface);
    color: var(--text);
  }

  .field-label {
    font-size: 13px;
    font-weight: 500;
    color: var(--text-dim);
    margin-bottom: 6px;
    display: block;
  }

  .field-group {
    margin-bottom: 16px;
  }

  /* ===== Accordion ===== */
  .accordion {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    margin-bottom: 8px;
    overflow: hidden;
  }

  .accordion-header {
    display: flex;
    flex-direction: row;
    align-items: center;
    justify-content: space-between;
    padding: 16px 20px;
    cursor: pointer;
    transition: background 0.2s ease;
    user-select: none;
  }

  .accordion-header:hover {
    background: rgba(255,255,255,0.02);
  }

  .accordion-header-left {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .accordion-title {
    font-size: 15px;
    font-weight: 600;
    color: var(--heading);
  }

  .accordion-subtitle {
    font-size: 13px;
    color: var(--text-dim);
  }

  .accordion-chevron {
    color: var(--text-muted);
    font-size: 12px;
    transition: transform 0.3s ease;
    flex-shrink: 0;
  }

  .accordion.open .accordion-chevron {
    transform: rotate(180deg);
  }

  .accordion-content {
    padding: 0 20px;
    max-height: 0;
    overflow: hidden;
    transition: max-height 0.3s ease, padding-bottom 0.3s ease;
  }

  .accordion.open .accordion-content {
    max-height: 2000px;
    padding-bottom: 20px;
  }

  /* ===== Threat Badge ===== */
  .threat-badge {
    display: inline-block;
    background: var(--crimson);
    color: #fff;
    font-size: 11px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    padding: 3px 10px;
    border-radius: 100px;
    line-height: 1.4;
  }

  /* ===== Save Bar ===== */
  .save-bar {
    display: flex;
    flex-direction: row;
    align-items: center;
    gap: 10px;
    padding: 20px 0;
    border-top: 1px solid var(--border);
  }

  /* ===== Toast ===== */
  .toast {
    position: fixed;
    bottom: 32px;
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: var(--crimson);
    color: #fff;
    font-size: 14px;
    font-weight: 500;
    padding: 12px 28px;
    border-radius: 8px;
    opacity: 0;
    pointer-events: none;
    transition: all 0.3s ease;
    z-index: 2000;
    box-shadow: 0 8px 32px rgba(0,0,0,0.4);
    white-space: nowrap;
  }

  .toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
    pointer-events: auto;
  }

  /* ===== Load Modal ===== */
  .load-modal-backdrop {
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    background: rgba(0,0,0,0.6);
    z-index: 999;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.25s ease;
  }

  .load-modal-backdrop.show {
    opacity: 1;
    pointer-events: auto;
  }

  .load-modal {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%) scale(0.95);
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    z-index: 1000;
    padding: 32px;
    min-width: 420px;
    max-width: 540px;
    width: 90%;
    box-shadow: 0 24px 64px rgba(0,0,0,0.5);
    opacity: 0;
    pointer-events: none;
    transition: all 0.25s ease;
  }

  .load-modal.show {
    opacity: 1;
    pointer-events: auto;
    transform: translate(-50%, -50%) scale(1);
  }

  .load-modal-title {
    font-size: 20px;
    font-weight: 700;
    color: var(--heading);
    margin-bottom: 4px;
  }

  .load-modal-desc {
    font-size: 14px;
    color: var(--text-dim);
    margin-bottom: 20px;
  }

  .load-modal-item {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 16px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    margin-bottom: 8px;
    cursor: pointer;
    transition: all 0.2s ease;
  }

  .load-modal-item:hover {
    border-color: rgba(255,255,255,0.15);
    background: rgba(255,255,255,0.04);
  }

  .load-modal-item-name {
    font-size: 14px;
    font-weight: 600;
    color: var(--heading);
  }

  .load-modal-item-date {
    font-size: 12px;
    color: var(--text-muted);
  }

  .load-modal-actions {
    display: flex;
    justify-content: flex-end;
    gap: 10px;
    margin-top: 20px;
  }

  /* ===== Situation Block ===== */
  .situation-block {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 20px;
    margin-bottom: 16px;
  }

  .situation-label {
    font-size: 15px;
    font-weight: 600;
    color: var(--heading);
    margin-bottom: 10px;
  }

  .situation-desc {
    font-size: 13px;
    color: var(--text-dim);
    margin-bottom: 12px;
  }

  /* ===== Section Divider ===== */
  .section-divider {
    border: none;
    border-top: 1px solid var(--border);
    margin: 28px 0;
  }

  /* ===== Summary styles (for Step 5) ===== */
  .summary-section {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 20px;
    margin-bottom: 16px;
  }

  .summary-section-title {
    font-size: 14px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    color: var(--text-muted);
    margin-bottom: 12px;
  }

  .summary-item {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    padding: 8px 0;
    border-bottom: 1px solid var(--border);
  }

  .summary-item:last-child {
    border-bottom: none;
  }

  .summary-item-label {
    font-size: 13px;
    color: var(--text-dim);
    flex-shrink: 0;
  }

  .summary-item-value {
    font-size: 14px;
    font-weight: 500;
    color: var(--heading);
    text-align: right;
  }

  /* ===== Animation ===== */
  @keyframes fadeUp {
    from {
      opacity: 0;
      transform: translateY(12px);
    }
    to {
      opacity: 1;
      transform: translateY(0);
    }
  }

  /* ===== Responsive: Tablet ===== */
  @media (max-width: 768px) {
    .card-selector {
      grid-template-columns: 1fr;
    }

    .progress-step-label {
      display: none;
    }

    .progress-step-circle {
      width: 30px;
      height: 30px;
      font-size: 12px;
    }

    .progress-line {
      margin-top: 15px;
    }

    .progress-bar {
      padding: 24px 20px 16px;
    }

    .wizard-container {
      padding: 0 20px 40px;
    }

    .header {
      padding: 16px 20px;
    }

    .step-title {
      font-size: 22px;
    }

    .step-subtitle {
      font-size: 14px;
    }

    .player-row-header {
      flex-direction: column;
      align-items: stretch;
    }

    .player-row-number,
    .player-row-position {
      width: 100%;
    }

    .matchup-row {
      flex-direction: column;
      align-items: stretch;
    }

    .matchup-vs {
      text-align: center;
      padding: 4px 0;
    }

    .load-modal {
      min-width: unset;
      width: 95%;
      padding: 24px;
    }

    .nav-buttons {
      gap: 10px;
    }

    .btn-next,
    .btn-back {
      padding: 10px 24px;
      font-size: 13px;
    }
  }

  /* ===== Responsive: Mobile ===== */
  @media (max-width: 480px) {
    .header {
      padding: 12px 16px;
    }

    .header-title {
      font-size: 14px;
    }

    .wizard-container {
      padding: 0 16px 32px;
    }

    .progress-bar {
      padding: 20px 16px 12px;
    }

    .progress-step-circle {
      width: 26px;
      height: 26px;
      font-size: 11px;
    }

    .progress-line {
      margin-top: 13px;
      min-width: 20px;
    }

    .step-title {
      font-size: 19px;
    }

    .step-subtitle {
      font-size: 13px;
      margin-bottom: 24px;
    }

    .nav-buttons {
      flex-direction: column;
      gap: 8px;
    }

    .nav-buttons-right {
      width: 100%;
      flex-direction: column;
    }

    .btn-next,
    .btn-back,
    .btn-save {
      width: 100%;
      text-align: center;
      justify-content: center;
      padding: 12px 20px;
    }

    .btn-ghost {
      padding: 8px 16px;
      font-size: 12px;
    }

    .card {
      padding: 16px;
    }

    .card-title {
      font-size: 14px;
    }

    .card-desc {
      font-size: 12px;
    }

    .accordion-header {
      padding: 14px 16px;
    }

    .accordion-content {
      padding: 0 16px;
    }

    .accordion.open .accordion-content {
      padding-bottom: 16px;
    }

    .situation-block {
      padding: 16px;
    }

    .summary-section {
      padding: 16px;
    }

    .field-label {
      font-size: 12px;
    }

    .load-modal {
      padding: 20px;
    }

    .load-modal-title {
      font-size: 17px;
    }
  }
</style>
</head>
<body>
  <div id="app"></div>
  <script>
  // ===== Constants =====
  const STEPS = ['identity', 'scouting', 'matchups', 'situations', 'summary'];
  const STEP_LABELS = ['Defensive Identity', 'Opponent Scouting', 'Matchup Assignments', 'Situations', 'Game Plan Summary'];

  // ===== State =====
  let currentStep = 0;
  let visitedSteps = new Set([0]);

  let gamePlan = {
    identity: {
      baseDefense: '',
      secondaryDefense: '',
      transitionStyle: '',
      playersBack: 3,
      reboundingPhilosophy: '',
      boxOutNotes: ''
    },
    scouting: {
      opponentName: '',
      gameDate: '',
      players: [],
      pace: '',
      primaryActions: [],
      strengths: '',
      weaknesses: ''
    },
    matchups: [],
    situations: {
      lateClock: '',
      atoPlays: '',
      foulRules: '',
      endOfPeriod: '',
      pressBreak: ''
    }
  };

  // ===== Navigation =====
  function goToStep(index) {
    if (index < 0 || index >= STEPS.length) return;
    currentStep = index;
    visitedSteps.add(index);
    render();
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }

  // ===== Render Engine =====
  function render() {
    const app = document.getElementById('app');
    app.innerHTML = renderHeader() + renderProgressBar() + '<div class="wizard-container">' + renderStep(currentStep) + renderNavButtons() + '</div>';
  }

  // ===== Header =====
  function renderHeader() {
    return `
      <div class="header">
        <div class="header-title"><span>DU</span> DEFENSIVE GAME PLAN</div>
        <div class="header-actions">
          <button class="btn-ghost" onclick="openLoadModal()">Load Plan</button>
          <button class="btn-ghost" onclick="newGamePlan()">New Plan</button>
        </div>
      </div>
    `;
  }

  // ===== Save / Load System =====
  function saveGamePlan() {
    const name = gamePlan.scouting.opponentName || 'Untitled';
    const date = gamePlan.scouting.gameDate || new Date().toISOString().split('T')[0];
    const key = 'du-game-plan-' + name.replace(/\s+/g, '-').toLowerCase() + '-' + date;

    localStorage.setItem(key, JSON.stringify(gamePlan));
    showToast('Game plan saved!');
  }

  function showToast(message) {
    let toast = document.querySelector('.toast');
    if (!toast) {
      toast = document.createElement('div');
      toast.className = 'toast';
      document.body.appendChild(toast);
    }
    toast.textContent = message;
    toast.classList.add('show');
    setTimeout(() => toast.classList.remove('show'), 2500);
  }

  function getSavedPlans() {
    const plans = [];
    for (let i = 0; i < localStorage.length; i++) {
      const key = localStorage.key(i);
      if (key.startsWith('du-game-plan-')) {
        try {
          const data = JSON.parse(localStorage.getItem(key));
          plans.push({
            key: key,
            name: data.scouting.opponentName || 'Untitled',
            date: data.scouting.gameDate || 'No date'
          });
        } catch(e) {}
      }
    }
    return plans.sort((a, b) => b.date.localeCompare(a.date));
  }

  function loadGamePlan(key) {
    const data = localStorage.getItem(key);
    if (data) {
      gamePlan = JSON.parse(data);
      currentStep = 0;
      visitedSteps = new Set([0, 1, 2, 3, 4]);
      closeLoadModal();
      render();
      showToast('Game plan loaded!');
    }
  }

  function deleteSavedPlan(key) {
    if (confirm('Delete this saved game plan?')) {
      localStorage.removeItem(key);
      // Refresh modal content
      closeLoadModal();
      openLoadModal();
      showToast('Plan deleted');
    }
  }

  function newGamePlan() {
    if (confirm('Start a new game plan? Unsaved changes will be lost.')) {
      gamePlan = {
        identity: { baseDefense: '', secondaryDefense: '', transitionStyle: '', playersBack: 3, reboundingPhilosophy: '', boxOutNotes: '' },
        scouting: { opponentName: '', gameDate: '', players: [], pace: '', primaryActions: [], strengths: '', weaknesses: '' },
        matchups: [],
        situations: { lateClock: '', atoPlays: '', foulRules: '', endOfPeriod: '', pressBreak: '' }
      };
      currentStep = 0;
      visitedSteps = new Set([0]);
      render();
      showToast('New game plan started');
    }
  }

  function openLoadModal() {
    // Remove any existing modal
    closeLoadModal();

    const plans = getSavedPlans();

    let planRows = '';
    if (plans.length === 0) {
      planRows = '<p style="color: var(--text-muted); font-style: italic; text-align: center; padding: 20px 0;">No saved game plans yet</p>';
    } else {
      plans.forEach(plan => {
        const escaped = plan.key.replace(/'/g, "\\'");
        planRows += `
          <div class="load-modal-item">
            <div>
              <div class="load-modal-item-name">${plan.name}</div>
              <div class="load-modal-item-date">${plan.date}</div>
            </div>
            <div style="display: flex; gap: 8px;">
              <button class="btn-ghost" style="font-size: 12px; padding: 6px 14px;" onclick="loadGamePlan('${escaped}')">Load</button>
              <button class="btn-danger" style="font-size: 12px; padding: 6px 14px;" onclick="event.stopPropagation(); deleteSavedPlan('${escaped}')">Delete</button>
            </div>
          </div>
        `;
      });
    }

    const backdrop = document.createElement('div');
    backdrop.className = 'load-modal-backdrop';
    backdrop.id = 'load-modal-backdrop';
    backdrop.onclick = closeLoadModal;

    const modal = document.createElement('div');
    modal.className = 'load-modal';
    modal.id = 'load-modal';
    modal.onclick = (e) => e.stopPropagation();
    modal.innerHTML = `
      <div class="load-modal-title">Load Game Plan</div>
      <div class="load-modal-desc">Select a previously saved game plan to load.</div>
      ${planRows}
      <div class="load-modal-actions">
        <button class="btn-ghost" onclick="closeLoadModal()">Close</button>
      </div>
    `;

    document.body.appendChild(backdrop);
    document.body.appendChild(modal);

    // Trigger transition after append
    requestAnimationFrame(() => {
      backdrop.classList.add('show');
      modal.classList.add('show');
    });
  }

  function closeLoadModal() {
    const backdrop = document.getElementById('load-modal-backdrop');
    const modal = document.getElementById('load-modal');
    if (backdrop) backdrop.remove();
    if (modal) modal.remove();
  }

  // ===== Progress Bar =====
  function renderProgressBar() {
    let html = '<div class="progress-bar">';
    for (let i = 0; i < STEPS.length; i++) {
      const isActive = i === currentStep;
      const isVisited = visitedSteps.has(i) && !isActive;
      let classes = 'progress-step';
      if (isActive) classes += ' active';
      else if (isVisited) classes += ' visited';

      const clickHandler = visitedSteps.has(i) ? `onclick="goToStep(${i})"` : '';

      html += `
        <div class="${classes}" ${clickHandler}>
          <span class="progress-step-circle">${i + 1}</span>
          <span class="progress-step-label">${STEP_LABELS[i]}</span>
        </div>
      `;

      if (i < STEPS.length - 1) {
        const lineVisited = visitedSteps.has(i + 1) ? ' visited' : '';
        html += `<div class="progress-line${lineVisited}"></div>`;
      }
    }
    html += '</div>';
    return html;
  }

  // ===== Nav Buttons =====
  function renderNavButtons() {
    const backHidden = currentStep === 0 ? 'style="visibility: hidden;"' : '';
    const isLastStep = currentStep === STEPS.length - 1;
    const isSituations = currentStep === 3;
    const nextLabel = isSituations ? 'View Summary' : 'Next';

    let nextBtn = '';
    if (!isLastStep) {
      nextBtn = `<button class="btn-next" onclick="goToStep(currentStep + 1)">${nextLabel}</button>`;
    }

    return `
      <div class="nav-buttons">
        <button class="btn-back" ${backHidden} onclick="goToStep(currentStep - 1)">Back</button>
        <div class="nav-buttons-right">
          ${nextBtn}
        </div>
      </div>
    `;
  }

  // ===== Step Router =====
  function renderStep(index) {
    switch (index) {
      case 0: return renderIdentityStep();
      case 1: return renderScoutingStep();
      case 2: return renderMatchupsStep();
      case 3: return renderSituationsStep();
      case 4: return renderSummaryStep();
      default: return '';
    }
  }

  // ===== Step 1: Defensive Identity =====
  function renderIdentityStep() {
    const baseDefenses = ['Man-to-Man', '2-3 Zone', '3-2 Zone', '1-3-1 Zone', 'Matchup Zone', '1-2-2 Press', 'Full Court Man Press'];

    // Base Defense Cards
    let baseCards = '';
    baseDefenses.forEach(def => {
      const selected = gamePlan.identity.baseDefense === def ? ' selected' : '';
      const escaped = def.replace(/'/g, "\\'");
      baseCards += `
        <div class="card${selected}" onclick="gamePlan.identity.baseDefense = '${escaped}'; render()">
          <div class="card-title">${def}</div>
        </div>
      `;
    });

    // Secondary Defense Chips
    let secondaryChips = '';
    baseDefenses.forEach(def => {
      const selected = gamePlan.identity.secondaryDefense === def ? ' selected' : '';
      const escaped = def.replace(/'/g, "\\'");
      secondaryChips += `
        <span class="chip${selected}" onclick="gamePlan.identity.secondaryDefense = gamePlan.identity.secondaryDefense === '${escaped}' ? '' : '${escaped}'; render()">${def}</span>
      `;
    });

    // Transition Defense Cards
    const transGetBack = gamePlan.identity.transitionStyle === 'Get Back' ? ' selected' : '';
    const transScramble = gamePlan.identity.transitionStyle === 'Scramble' ? ' selected' : '';

    // Rebounding Philosophy Cards
    const rebCrash = gamePlan.identity.reboundingPhilosophy === 'Crash the Boards' ? ' selected' : '';
    const rebGetBack = gamePlan.identity.reboundingPhilosophy === 'Get Back' ? ' selected' : '';

    return `
      <div class="step-panel active">
        <h2 class="step-title">Defensive Identity</h2>
        <p class="step-subtitle">Set your team's core defensive philosophy and approach.</p>

        <label class="field-label">Base Defense</label>
        <div class="card-selector">
          ${baseCards}
        </div>

        <hr class="section-divider">

        <label class="field-label">Change-Up Defense (Optional)</label>
        <div class="chip-group">
          ${secondaryChips}
        </div>

        <hr class="section-divider">

        <label class="field-label">Transition Defense</label>
        <div class="card-selector">
          <div class="card${transGetBack}" onclick="gamePlan.identity.transitionStyle = 'Get Back'; render()">
            <div class="card-title">Get Back</div>
            <div class="card-desc">Prioritize getting back in half-court defense</div>
          </div>
          <div class="card${transScramble}" onclick="gamePlan.identity.transitionStyle = 'Scramble'; render()">
            <div class="card-title">Scramble</div>
            <div class="card-desc">Aggressive — gamble for steals in transition</div>
          </div>
        </div>
        <div class="field-group" style="margin-top: 16px;">
          <label class="field-label">Players back on shot:</label>
          <input class="input-field" type="number" min="1" max="5" value="${gamePlan.identity.playersBack}" oninput="gamePlan.identity.playersBack = parseInt(this.value) || 3" style="width: 100px;">
        </div>

        <hr class="section-divider">

        <label class="field-label">Rebounding Philosophy</label>
        <div class="card-selector">
          <div class="card${rebCrash}" onclick="gamePlan.identity.reboundingPhilosophy = 'Crash the Boards'; render()">
            <div class="card-title">Crash the Boards</div>
            <div class="card-desc">Send 3-4 players to offensive rebound</div>
          </div>
          <div class="card${rebGetBack}" onclick="gamePlan.identity.reboundingPhilosophy = 'Get Back'; render()">
            <div class="card-title">Get Back</div>
            <div class="card-desc">1-2 rebounders, prioritize transition defense</div>
          </div>
        </div>
        <div class="field-group" style="margin-top: 16px;">
          <label class="field-label">Box-out assignment notes</label>
          <textarea class="textarea-field" placeholder="e.g. PG takes free-throw shooter, C boxes out their C..." oninput="gamePlan.identity.boxOutNotes = this.value">${gamePlan.identity.boxOutNotes}</textarea>
        </div>
      </div>
    `;
  }

  // ===== Step 2: Opponent Scouting =====
  const TENDENCY_OPTIONS = [
    'Elite Shooter', 'Weak Ball Handler', 'Post Threat', 'Transition Scorer',
    'PnR Ball Handler', 'Slasher', 'Spot-Up Shooter', 'Rim Protector',
    'Poor Free Throw', 'Left Hand Dominant'
  ];

  const PRIMARY_ACTION_OPTIONS = ['PnR', 'Motion', 'Post-Ups', 'Isolation', 'Transition', 'DHO', 'Horns', 'Flex'];

  function toggleTendency(playerIndex, tendency) {
    const t = gamePlan.scouting.players[playerIndex].tendencies;
    const idx = t.indexOf(tendency);
    if (idx >= 0) t.splice(idx, 1);
    else t.push(tendency);
    render();
  }

  function toggleAction(action) {
    const a = gamePlan.scouting.primaryActions;
    const idx = a.indexOf(action);
    if (idx >= 0) a.splice(idx, 1);
    else a.push(action);
    render();
  }

  function addCustomTendency(playerIndex) {
    const input = document.getElementById('custom-tendency-' + playerIndex);
    if (!input) return;
    const val = input.value.trim();
    if (val && !gamePlan.scouting.players[playerIndex].tendencies.includes(val)) {
      gamePlan.scouting.players[playerIndex].tendencies.push(val);
      render();
    }
  }

  function renderScoutingStep() {
    const s = gamePlan.scouting;

    // --- Opponent Info Header ---
    let html = `
      <div class="step-panel active">
        <h2 class="step-title">Opponent Scouting</h2>
        <p class="step-subtitle">Scout the opposing team's players and tendencies.</p>

        <div style="display: flex; gap: 12px; margin-bottom: 24px;">
          <div class="field-group" style="flex: 1; margin-bottom: 0;">
            <label class="field-label">Opponent Team Name</label>
            <input class="input-field" type="text" placeholder="Opponent Team Name" value="${s.opponentName}" oninput="gamePlan.scouting.opponentName = this.value">
          </div>
          <div class="field-group" style="flex-shrink: 0; margin-bottom: 0;">
            <label class="field-label">Game Date</label>
            <input class="input-field" type="date" value="${s.gameDate}" oninput="gamePlan.scouting.gameDate = this.value">
          </div>
        </div>

        <label class="field-label">Opponent Players</label>
    `;

    // --- Player Entry List ---
    s.players.forEach((player, i) => {
      const escaped = (str) => str.replace(/"/g, '&quot;');

      // Tendency chips
      let tendencyChips = '';
      TENDENCY_OPTIONS.forEach(t => {
        const sel = player.tendencies.includes(t) ? ' selected' : '';
        const tEsc = t.replace(/'/g, "\\'");
        tendencyChips += `<span class="chip${sel}" onclick="toggleTendency(${i}, '${tEsc}')">${t}</span>`;
      });
      // Custom tendencies not in the preset list
      player.tendencies.forEach(t => {
        if (!TENDENCY_OPTIONS.includes(t)) {
          const tEsc = t.replace(/'/g, "\\'");
          tendencyChips += `<span class="chip selected" onclick="toggleTendency(${i}, '${tEsc}')">${t}</span>`;
        }
      });

      html += `
        <div class="player-row">
          <div class="player-row-header">
            <input class="input-field" type="text" placeholder="Player Name" value="${escaped(player.name)}" oninput="gamePlan.scouting.players[${i}].name = this.value">
            <input class="input-field player-row-number" type="number" placeholder="#" min="1" max="99" value="${player.number}" oninput="gamePlan.scouting.players[${i}].number = this.value">
            <select class="select-field player-row-position" onchange="gamePlan.scouting.players[${i}].position = this.value">
              <option value="PG"${player.position === 'PG' ? ' selected' : ''}>PG</option>
              <option value="SG"${player.position === 'SG' ? ' selected' : ''}>SG</option>
              <option value="SF"${player.position === 'SF' ? ' selected' : ''}>SF</option>
              <option value="PF"${player.position === 'PF' ? ' selected' : ''}>PF</option>
              <option value="C"${player.position === 'C' ? ' selected' : ''}>C</option>
            </select>
            <button class="player-row-remove" onclick="gamePlan.scouting.players.splice(${i}, 1); syncMatchups(); render()" title="Remove player">&times;</button>
          </div>
          <div class="chip-group">
            ${tendencyChips}
            <span class="chip-custom">
              <input type="text" id="custom-tendency-${i}" placeholder="Custom..." onkeydown="if(event.key==='Enter'){addCustomTendency(${i})}">
              <span style="cursor:pointer; color: var(--text-dim);" onclick="addCustomTendency(${i})">+</span>
            </span>
          </div>
          <textarea class="textarea-field" placeholder="Scouting notes for this player..." style="min-height: 50px;" oninput="gamePlan.scouting.players[${i}].notes = this.value">${player.notes}</textarea>
        </div>
      `;
    });

    // Add Player button (max 10)
    if (s.players.length < 10) {
      html += `
        <button class="player-add-btn" onclick="gamePlan.scouting.players.push({ name: '', number: '', position: 'PG', tendencies: [], notes: '' }); syncMatchups(); render()">
          + Add Player
        </button>
      `;
    }

    // --- Team Tendencies Section ---
    const paceFast = s.pace === 'Fast' ? ' selected' : '';
    const paceModerate = s.pace === 'Moderate' ? ' selected' : '';
    const paceSlow = s.pace === 'Slow' ? ' selected' : '';

    let actionChips = '';
    PRIMARY_ACTION_OPTIONS.forEach(a => {
      const sel = s.primaryActions.includes(a) ? ' selected' : '';
      const aEsc = a.replace(/'/g, "\\'");
      actionChips += `<span class="chip${sel}" onclick="toggleAction('${aEsc}')">${a}</span>`;
    });

    html += `
        <hr class="section-divider">

        <label class="field-label">Pace</label>
        <div class="card-selector" style="grid-template-columns: repeat(3, 1fr);">
          <div class="card${paceFast}" onclick="gamePlan.scouting.pace = 'Fast'; render()">
            <div class="card-title">Fast</div>
          </div>
          <div class="card${paceModerate}" onclick="gamePlan.scouting.pace = 'Moderate'; render()">
            <div class="card-title">Moderate</div>
          </div>
          <div class="card${paceSlow}" onclick="gamePlan.scouting.pace = 'Slow'; render()">
            <div class="card-title">Slow</div>
          </div>
        </div>

        <div class="field-group" style="margin-top: 24px;">
          <label class="field-label">Primary Actions</label>
          <div class="chip-group">
            ${actionChips}
          </div>
        </div>

        <div class="field-group">
          <label class="field-label">Strengths</label>
          <textarea class="textarea-field" placeholder="What does this team do well?" oninput="gamePlan.scouting.strengths = this.value">${s.strengths}</textarea>
        </div>

        <div class="field-group">
          <label class="field-label">Weaknesses</label>
          <textarea class="textarea-field" placeholder="Where are they vulnerable?" oninput="gamePlan.scouting.weaknesses = this.value">${s.weaknesses}</textarea>
        </div>
      </div>
    `;

    return html;
  }

  // ===== Step 3: Matchup Assignments =====
  function syncMatchups() {
    const players = gamePlan.scouting.players;
    const existing = gamePlan.matchups;

    // Build a new matchups array that stays in sync with scouting players
    const synced = players.map((player, i) => {
      // Find existing matchup for this index (preserve data)
      const found = existing[i];
      if (found && found.opponentIndex === i) {
        return found;
      }
      // Check if there's an existing entry we can reuse by index
      if (existing[i]) {
        return { opponentIndex: i, defender: existing[i].defender || '', instruction: existing[i].instruction || '', isPrimaryThreat: existing[i].isPrimaryThreat || false };
      }
      return { opponentIndex: i, defender: '', instruction: '', isPrimaryThreat: false };
    });

    gamePlan.matchups = synced;
  }

  function renderMatchupsStep() {
    const players = gamePlan.scouting.players;

    // Empty state
    if (players.length === 0) {
      return `
        <div class="step-panel active">
          <h2 class="step-title">Matchup Assignments</h2>
          <p class="step-subtitle">Assign a defender and instructions for each opponent player.</p>
          <div style="text-align: center; padding: 48px 0;">
            <p style="color: var(--text-dim); font-size: 15px; margin-bottom: 16px;">Add opponent players in Step 2 first</p>
            <button class="btn-next" onclick="goToStep(1)">Go to Scouting</button>
          </div>
        </div>
      `;
    }

    // Sync matchups with current players
    syncMatchups();

    let html = `
      <div class="step-panel active">
        <h2 class="step-title">Matchup Assignments</h2>
        <p class="step-subtitle">Assign a defender and instructions for each opponent player.</p>
    `;

    players.forEach((player, i) => {
      const m = gamePlan.matchups[i];
      const escaped = (str) => (str || '').replace(/"/g, '&quot;');

      // Read-only tendency chips
      let tendencyDisplay = '';
      if (player.tendencies.length > 0) {
        tendencyDisplay = '<div class="chip-group" style="margin-top: 6px;">';
        player.tendencies.forEach(t => {
          tendencyDisplay += `<span class="chip" style="cursor: default; font-size: 11px; padding: 4px 10px;">${t}</span>`;
        });
        tendencyDisplay += '</div>';
      }

      const threatBadge = m.isPrimaryThreat ? '<span class="threat-badge">Primary Threat</span>' : '';
      const threatBtnClass = m.isPrimaryThreat ? 'btn-danger' : 'btn-ghost';
      const threatBtnLabel = m.isPrimaryThreat ? 'Primary Threat' : 'Mark as Threat';

      html += `
        <div class="matchup-row" style="flex-wrap: wrap;">
          <div style="flex: 1; min-width: 200px;">
            <div style="display: flex; align-items: center; gap: 8px; margin-bottom: 4px;">
              <span style="font-size: 15px; font-weight: 600; color: var(--heading);">${player.name || 'Unnamed Player'}</span>
              ${player.number ? '<span style="font-size: 13px; color: var(--text-muted);">#' + player.number + '</span>' : ''}
              <span style="font-size: 12px; color: var(--text-muted); background: var(--surface2); padding: 2px 8px; border-radius: 4px;">${player.position}</span>
              ${threatBadge}
            </div>
            ${tendencyDisplay}
          </div>
          <span class="matchup-vs">VS</span>
          <div style="flex: 1; min-width: 200px; display: flex; flex-direction: column; gap: 8px;">
            <input class="input-field" type="text" placeholder="DU Defender" value="${escaped(m.defender)}" oninput="gamePlan.matchups[${i}].defender = this.value">
            <input class="input-field" type="text" placeholder="e.g. force left, deny catch" value="${escaped(m.instruction)}" oninput="gamePlan.matchups[${i}].instruction = this.value">
            <button class="${threatBtnClass}" style="align-self: flex-start; font-size: 12px; padding: 6px 14px;" onclick="gamePlan.matchups[${i}].isPrimaryThreat = !gamePlan.matchups[${i}].isPrimaryThreat; render()">
              ${threatBtnLabel}
            </button>
          </div>
        </div>
      `;
    });

    html += '</div>';
    return html;
  }

  // ===== Step 4: Situation Adjustments =====
  function renderSituationsStep() {
    const sit = gamePlan.situations;
    return `
      <div class="step-panel active">
        <h2 class="step-title">Situation Adjustments</h2>
        <p class="step-subtitle">Define how your team responds in key game situations.</p>

        <div class="situation-block">
          <div class="situation-label">What do we do when the shot clock is under 8 seconds?</div>
          <textarea class="textarea-field" placeholder="e.g. Switch everything, no help, contest all shots..." oninput="gamePlan.situations.lateClock = this.value">${sit.lateClock}</textarea>
        </div>

        <div class="situation-block">
          <div class="situation-label">How do we defend their after-timeout and out-of-bounds plays?</div>
          <textarea class="textarea-field" placeholder="e.g. Switch on all screens, deny inbound to #23..." oninput="gamePlan.situations.atoPlays = this.value">${sit.atoPlays}</textarea>
        </div>

        <div class="situation-block">
          <div class="situation-label">When do we foul? When do we avoid fouls?</div>
          <textarea class="textarea-field" placeholder="e.g. No fouls on 3pt shooters, foul on drives under 2 min..." oninput="gamePlan.situations.foulRules = this.value">${sit.foulRules}</textarea>
        </div>

        <div class="situation-block">
          <div class="situation-label">Defensive approach in final 2 minutes of each half?</div>
          <textarea class="textarea-field" placeholder="e.g. Full court press if down, protect paint if ahead..." oninput="gamePlan.situations.endOfPeriod = this.value">${sit.endOfPeriod}</textarea>
        </div>

        <div class="situation-block">
          <div class="situation-label">When do we press? When do we pull back?</div>
          <textarea class="textarea-field" placeholder="e.g. Press after made baskets in 2nd half, pull back if they break it twice..." oninput="gamePlan.situations.pressBreak = this.value">${sit.pressBreak}</textarea>
        </div>
      </div>
    `;
  }

  // ===== Step 5: Game Plan Summary =====
  function toggleAccordion(id) {
    const el = document.getElementById(id);
    if (el) el.classList.toggle('open');
  }

  function renderSummaryStep() {
    const id = gamePlan.identity;
    const sc = gamePlan.scouting;
    const matchups = gamePlan.matchups;
    const sit = gamePlan.situations;
    const muted = (text) => `<span style="color: var(--text-muted); font-style: italic;">${text}</span>`;

    // --- Accordion 1: Defensive Identity ---
    let identityContent = '';
    identityContent += `<div class="summary-item"><span class="summary-item-label">Base Defense</span><span class="summary-item-value">${id.baseDefense || muted('Not set')}</span></div>`;
    if (id.secondaryDefense) {
      identityContent += `<div class="summary-item"><span class="summary-item-label">Change-Up Defense</span><span class="summary-item-value">${id.secondaryDefense}</span></div>`;
    }
    identityContent += `<div class="summary-item"><span class="summary-item-label">Transition Style</span><span class="summary-item-value">${id.transitionStyle || muted('Not set')}</span></div>`;
    identityContent += `<div class="summary-item"><span class="summary-item-label">Players Back on Shot</span><span class="summary-item-value">${id.playersBack}</span></div>`;
    identityContent += `<div class="summary-item"><span class="summary-item-label">Rebounding</span><span class="summary-item-value">${id.reboundingPhilosophy || muted('Not set')}</span></div>`;
    if (id.boxOutNotes) {
      identityContent += `<div class="summary-item"><span class="summary-item-label">Box-Out Notes</span><span class="summary-item-value" style="max-width: 60%; text-align: right;">${id.boxOutNotes}</span></div>`;
    }

    // --- Accordion 2: Opponent Overview ---
    let opponentContent = '';
    opponentContent += `<div class="summary-item"><span class="summary-item-label">Opponent</span><span class="summary-item-value">${sc.opponentName || muted('Not set')}</span></div>`;
    opponentContent += `<div class="summary-item"><span class="summary-item-label">Game Date</span><span class="summary-item-value">${sc.gameDate || muted('Not set')}</span></div>`;
    opponentContent += `<div class="summary-item"><span class="summary-item-label">Pace</span><span class="summary-item-value">${sc.pace || muted('Not set')}</span></div>`;
    if (sc.primaryActions.length > 0) {
      let actionChips = '<div class="chip-group" style="justify-content: flex-end;">';
      sc.primaryActions.forEach(a => {
        actionChips += `<span class="chip selected" style="cursor: default; font-size: 11px; padding: 4px 10px;">${a}</span>`;
      });
      actionChips += '</div>';
      opponentContent += `<div class="summary-item"><span class="summary-item-label">Primary Actions</span><span class="summary-item-value">${actionChips}</span></div>`;
    }
    if (sc.strengths) {
      opponentContent += `<div class="summary-item"><span class="summary-item-label">Strengths</span><span class="summary-item-value" style="max-width: 60%; text-align: right;">${sc.strengths}</span></div>`;
    }
    if (sc.weaknesses) {
      opponentContent += `<div class="summary-item"><span class="summary-item-label">Weaknesses</span><span class="summary-item-value" style="max-width: 60%; text-align: right;">${sc.weaknesses}</span></div>`;
    }

    // --- Accordion 3: Opponent Players ---
    let playersContent = '';
    if (sc.players.length === 0) {
      playersContent = `<p style="color: var(--text-muted); font-style: italic;">No players added</p>`;
    } else {
      playersContent += `<p style="color: var(--text-dim); font-size: 13px; margin-bottom: 12px;">${sc.players.length} player${sc.players.length !== 1 ? 's' : ''} scouted</p>`;
      sc.players.forEach(player => {
        let tendencyChips = '';
        if (player.tendencies.length > 0) {
          tendencyChips = '<div class="chip-group" style="margin-top: 6px;">';
          player.tendencies.forEach(t => {
            tendencyChips += `<span class="chip" style="cursor: default; font-size: 11px; padding: 4px 10px;">${t}</span>`;
          });
          tendencyChips += '</div>';
        }
        playersContent += `
          <div style="padding: 10px 0; border-bottom: 1px solid var(--border);">
            <div style="display: flex; align-items: center; gap: 8px;">
              <span style="font-weight: 600; color: var(--heading);">${player.name || 'Unnamed'}</span>
              ${player.number ? '<span style="font-size: 13px; color: var(--text-muted);">#' + player.number + '</span>' : ''}
              <span style="font-size: 12px; color: var(--text-muted); background: var(--surface2); padding: 2px 8px; border-radius: 4px;">${player.position}</span>
            </div>
            ${tendencyChips}
            ${player.notes ? '<p style="font-size: 13px; color: var(--text-dim); margin-top: 6px;">' + player.notes + '</p>' : ''}
          </div>
        `;
      });
    }

    // --- Accordion 4: Matchup Assignments ---
    let matchupsContent = '';
    if (matchups.length === 0 || sc.players.length === 0) {
      matchupsContent = `<p style="color: var(--text-muted); font-style: italic;">No matchups assigned</p>`;
    } else {
      matchups.forEach((m, i) => {
        const player = sc.players[i];
        if (!player) return;
        const threatBadge = m.isPrimaryThreat ? ' <span class="threat-badge">Primary Threat</span>' : '';
        matchupsContent += `
          <div style="padding: 10px 0; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 10px; flex-wrap: wrap;">
            <span style="font-weight: 600; color: var(--heading);">${player.name || 'Unnamed'}</span>
            ${threatBadge}
            <span style="color: var(--text-muted); font-size: 12px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em;">vs</span>
            <span style="font-weight: 600; color: var(--gold);">${m.defender || muted('Unassigned')}</span>
            ${m.instruction ? '<span style="font-size: 13px; color: var(--text-dim); margin-left: auto;">' + m.instruction + '</span>' : ''}
          </div>
        `;
      });
    }

    // --- Accordion 5: Situation Rules ---
    const situationEntries = [
      { key: 'lateClock', label: 'Late Shot Clock Defense' },
      { key: 'atoPlays', label: 'ATO / BLOB / SLOB' },
      { key: 'foulRules', label: 'Foul Situation Rules' },
      { key: 'endOfPeriod', label: 'End of Half / End of Game' },
      { key: 'pressBreak', label: 'Press Moments' }
    ];
    let situationsContent = '';
    situationEntries.forEach(entry => {
      const value = sit[entry.key];
      situationsContent += `
        <div class="summary-item">
          <span class="summary-item-label">${entry.label}</span>
          <span class="summary-item-value" style="max-width: 60%; text-align: right;">${value || muted('Not set')}</span>
        </div>
      `;
    });

    return `
      <div class="step-panel active">
        <h2 class="step-title">Game Plan Summary</h2>
        <p class="step-subtitle">Review your complete defensive game plan before saving.</p>

        <div class="accordion open" id="acc-identity">
          <div class="accordion-header" onclick="toggleAccordion('acc-identity')">
            <span class="accordion-title">Defensive Identity</span>
            <div>
              <button class="btn-ghost" onclick="event.stopPropagation(); goToStep(0)" style="margin-right:8px;font-size:13px">Edit</button>
              <span class="accordion-chevron">&#9662;</span>
            </div>
          </div>
          <div class="accordion-content">${identityContent}</div>
        </div>

        <div class="accordion open" id="acc-opponent">
          <div class="accordion-header" onclick="toggleAccordion('acc-opponent')">
            <span class="accordion-title">Opponent Overview</span>
            <div>
              <button class="btn-ghost" onclick="event.stopPropagation(); goToStep(1)" style="margin-right:8px;font-size:13px">Edit</button>
              <span class="accordion-chevron">&#9662;</span>
            </div>
          </div>
          <div class="accordion-content">${opponentContent}</div>
        </div>

        <div class="accordion open" id="acc-players">
          <div class="accordion-header" onclick="toggleAccordion('acc-players')">
            <span class="accordion-title">Opponent Players</span>
            <div>
              <button class="btn-ghost" onclick="event.stopPropagation(); goToStep(1)" style="margin-right:8px;font-size:13px">Edit</button>
              <span class="accordion-chevron">&#9662;</span>
            </div>
          </div>
          <div class="accordion-content">${playersContent}</div>
        </div>

        <div class="accordion open" id="acc-matchups">
          <div class="accordion-header" onclick="toggleAccordion('acc-matchups')">
            <span class="accordion-title">Matchup Assignments</span>
            <div>
              <button class="btn-ghost" onclick="event.stopPropagation(); goToStep(2)" style="margin-right:8px;font-size:13px">Edit</button>
              <span class="accordion-chevron">&#9662;</span>
            </div>
          </div>
          <div class="accordion-content">${matchupsContent}</div>
        </div>

        <div class="accordion open" id="acc-situations">
          <div class="accordion-header" onclick="toggleAccordion('acc-situations')">
            <span class="accordion-title">Situation Rules</span>
            <div>
              <button class="btn-ghost" onclick="event.stopPropagation(); goToStep(3)" style="margin-right:8px;font-size:13px">Edit</button>
              <span class="accordion-chevron">&#9662;</span>
            </div>
          </div>
          <div class="accordion-content">${situationsContent}</div>
        </div>

        <div class="save-bar">
          <button class="btn-save" onclick="saveGamePlan()">Save Game Plan</button>
        </div>
      </div>
    `;
  }

  // ===== Initialize =====
  render();
  </script>
</body>
</html>
