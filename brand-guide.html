  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg: #0B0E14;
    --surface: #12161F;
    --surface2: #1A1F2B;
    --border: rgba(255,255,255,0.07);
    --text: #E8EAED;
    --text-dim: #8B919E;
    --text-muted: #555B69;
    --heading: #ffffff;
    --accent: #0ED4C5;
    --accent-dark: #0A9E93;
    --radius: 14px;
    --radius-btn: 8px;
    --radius-icon: 11px;
    --sp: 1;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Outfit', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ===================== GUIDE LAYOUT ===================== */
  .guide-wrap {
    max-width: 1100px;
    margin: 0 auto;
    padding: 60px;
  }

  .guide-section {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 40px;
    margin-bottom: 48px;
  }

  .guide-section-title {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-bottom: 24px;
  }

  /* ===================== HEADER ===================== */
  .guide-header {
    margin-bottom: 48px;
    text-align: left;
  }
  .guide-header-logo {
    max-height: 80px;
    width: auto;
    object-fit: contain;
    margin-bottom: 16px;
  }
  .guide-header h1 {
    font-size: 44px;
    font-weight: 800;
    letter-spacing: -1.5px;
    color: var(--heading);
    margin-bottom: 12px;
  }
  .guide-header-bar {
    width: 80px;
    height: 4px;
    border-radius: 2px;
    background: var(--accent);
    margin-bottom: 24px;
  }
  .guide-header-actions {
    display: flex;
    gap: 12px;
    align-items: center;
  }
  .guide-header-actions a,
  .guide-header-actions button {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 10px 20px;
    border-radius: var(--radius-btn);
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    font-family: 'Outfit', sans-serif;
    letter-spacing: 0.2px;
    text-decoration: none;
    transition: all 0.2s ease;
  }
  .guide-btn-primary {
    background: var(--accent);
    color: var(--bg);
    border: none;
  }
  .guide-btn-primary:hover {
    opacity: 0.9;
    transform: translateY(-1px);
  }
  .guide-btn-secondary {
    background: transparent;
    color: var(--text-dim);
    border: 1px solid var(--border);
  }
  .guide-btn-secondary:hover {
    border-color: color-mix(in srgb, var(--text) 25%, transparent);
    color: var(--text);
  }

  /* ===================== COLOR SWATCHES ===================== */
  .guide-swatches {
    display: grid;
    grid-template-columns: repeat(6, 1fr);
    gap: 12px;
  }
  .guide-swatch {
    border-radius: var(--radius);
    overflow: hidden;
    border: 1px solid var(--border);
    background: var(--surface);
  }
  .guide-swatch-color {
    height: 80px;
  }
  .guide-swatch-meta {
    padding: 12px 14px;
  }
  .guide-swatch-label {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 1.2px;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-bottom: 3px;
  }
  .guide-swatch-hex {
    font-size: 13px;
    font-weight: 500;
    color: var(--text);
    font-family: 'Sora', monospace;
  }

  /* ===================== TYPOGRAPHY ===================== */
  .guide-type-block {
    margin-bottom: 28px;
  }
  .guide-type-block:last-child {
    margin-bottom: 0;
  }
  .guide-type-label {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-bottom: 8px;
  }
  .guide-type-sample {
    color: var(--heading);
    letter-spacing: -0.3px;
    margin-bottom: 6px;
  }
  .guide-type-spec {
    font-size: 12px;
    color: var(--text-dim);
  }

  /* ===================== DESIGN TOKENS ===================== */
  .guide-tokens-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 24px;
  }
  .guide-token-item {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .guide-token-label {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--text-muted);
  }
  .guide-token-value {
    font-size: 14px;
    font-weight: 600;
    color: var(--heading);
  }
  .guide-token-visual {
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .guide-radius-box {
    width: 48px;
    height: 48px;
    border: 2px solid var(--accent);
    background: transparent;
  }
  .guide-token-buttons {
    display: flex;
    gap: 10px;
    align-items: center;
  }

  /* ===================== PREVIEW GRID ===================== */
  .preview-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: calc(20px * var(--sp, 1));
  }
  .preview-card {
    border-radius: var(--radius);
    overflow: hidden;
    border: 1px solid var(--border);
  }
  .preview-label {
    padding: 12px 18px;
    background: var(--surface);
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--text-muted);
    border-bottom: 1px solid var(--border);
  }
  .preview-body {
    padding: calc(36px * var(--sp, 1));
    display: flex;
    flex-direction: column;
    gap: calc(18px * var(--sp, 1));
    min-height: 240px;
    position: relative;
    overflow: hidden;
  }

  /* Logo */
  .logo-text {
    font-weight: 800;
    font-size: 30px;
    letter-spacing: -1px;
  }
  .tagline-text {
    font-size: 13px;
    font-weight: 400;
    letter-spacing: 0.3px;
  }

  /* Buttons */
  .btn-row { display: flex; gap: 10px; align-items: center; }
  .pbtn {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 10px 20px;
    border-radius: var(--radius-btn);
    font-size: 13px;
    font-weight: 600;
    border: none;
    cursor: pointer;
    width: fit-content;
    font-family: inherit;
    letter-spacing: 0.2px;
  }
  .pbtn-outline {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 9px 19px;
    border-radius: var(--radius-btn);
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    width: fit-content;
    font-family: inherit;
    background: transparent;
    letter-spacing: 0.2px;
  }

  /* Stat */
  .stat-num {
    font-size: 52px;
    font-weight: 800;
    letter-spacing: -2px;
    line-height: 1;
  }
  .stat-label {
    font-size: 12px;
    font-weight: 500;
    line-height: 1.5;
  }
  .body-text {
    font-size: 14px;
    line-height: 1.7;
    max-width: 480px;
  }
  .heading-text {
    font-size: 24px;
    font-weight: 700;
    letter-spacing: -0.3px;
    line-height: 1.3;
  }

  /* Social icon */
  .social-icon {
    width: 44px;
    height: 44px;
    border-radius: var(--radius-icon, 11px);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 20px;
    font-weight: 800;
  }
  .social-center {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    gap: 14px;
    min-height: 240px;
  }

  /* Email button sizing override */
  .email-btn-wrap .pbtn,
  .email-btn-wrap .pbtn-outline {
    font-size: 12px;
    padding: 8px 18px;
  }

  /* Full width */
  .full-width { grid-column: 1 / -1; }

  /* ===================== ARTWORK OVERLAYS ===================== */
  /* Line art */
  .art-lines::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    opacity: 0.07;
    background:
      repeating-linear-gradient(90deg, currentColor 0px, currentColor 1px, transparent 1px, transparent 60px),
      repeating-linear-gradient(0deg, currentColor 0px, currentColor 1px, transparent 1px, transparent 60px);
    pointer-events: none;
  }

  /* Geometric */
  .art-geo::before {
    content: '';
    position: absolute;
    top: -20%; right: -10%;
    width: 300px; height: 300px;
    border-radius: 50%;
    opacity: 0.08;
    background: radial-gradient(circle, currentColor 0%, transparent 70%);
    pointer-events: none;
  }
  .art-geo::after {
    content: '';
    position: absolute;
    bottom: -30%; left: -5%;
    width: 200px; height: 200px;
    border: 2px solid currentColor;
    border-radius: 50%;
    opacity: 0.06;
    pointer-events: none;
  }

  /* Gradient mesh */
  .art-mesh::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    opacity: 0.12;
    background:
      radial-gradient(ellipse at 20% 50%, currentColor 0%, transparent 50%),
      radial-gradient(ellipse at 80% 20%, currentColor 0%, transparent 40%);
    pointer-events: none;
  }

  /* Dots */
  .art-dots::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    opacity: 0.06;
    background-image: radial-gradient(circle, currentColor 1px, transparent 1px);
    background-size: 20px 20px;
    pointer-events: none;
  }

  /* Noise grain */
  .art-grain::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    opacity: 0.04;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
    background-size: 128px;
    pointer-events: none;
  }

  /* ===================== FOOTER ===================== */
  .guide-footer {
    text-align: center;
    padding: 24px 0 60px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 12px;
  }
  .guide-footer a {
    font-size: 14px;
    font-weight: 600;
    color: var(--accent);
    text-decoration: none;
  }
  .guide-footer a:hover {
    text-decoration: underline;
  }
  .guide-footer-credit {
    font-size: 12px;
    color: var(--text-muted);
  }

  /* ===================== RESPONSIVE ===================== */
  @media (max-width: 1000px) {
    .guide-wrap { padding: 32px 24px; }
    .guide-section { padding: 28px; }
    .preview-grid { grid-template-columns: 1fr; }
    .full-width { grid-column: 1; }
    .guide-swatches { grid-template-columns: repeat(3, 1fr); }
    .guide-tokens-grid { grid-template-columns: 1fr; }
  }

  @media (max-width: 600px) {
    .guide-wrap { padding: 20px 16px; }
    .guide-section { padding: 20px; }
    .guide-swatches { grid-template-columns: repeat(2, 1fr); }
    .guide-header h1 { font-size: 30px; }
    .guide-header-actions { flex-direction: column; align-items: flex-start; }
  }

  /* ===================== PRINT ===================== */
  @media print {
    .no-print { display: none !important; }
    * { -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; }
    .guide-section { break-inside: avoid; page-break-inside: avoid; }
    .usage-examples { break-before: page; }
    body { background: white; }
    .guide-wrap { padding: 20px; max-width: 100%; }
  }
</style>

];

// ============================================================
// STATE
// ============================================================
let state = {
  palette: 0,
  accent: 0,
  type: 0,
  art: 0,
  motion: 0,
  radius: 2,
  spacing: 1,
  icon: 0,
  button: 0,
  logo: null,
};

// ============================================================
// DECODE STATE FROM URL
// ============================================================
function decodeStateFromParams() {
  const params = new URLSearchParams(window.location.search);
  if (!params.has('p')) return;
  const safeInt = (key, fallback, max) => {
    const v = parseInt(params.get(key));
    return (isNaN(v) || v < 0 || v >= max) ? fallback : v;
  };
  state.palette = safeInt('p', 0, palettes.length);
  state.accent = safeInt('a', 0, palettes[state.palette].accentOptions.length);
  state.type = safeInt('t', 0, typographyOptions.length);
  state.art = safeInt('ar', 0, artworkOptions.length);
  state.motion = safeInt('m', 0, motionOptions.length);
  state.radius = safeInt('r', 2, radiusOptions.length);
  state.spacing = safeInt('s', 1, spacingOptions.length);
  state.icon = safeInt('i', 0, iconOptions.length);
  state.button = safeInt('b', 0, buttonOptions.length);
  if (params.get('logo')) {
    state.logo = params.get('logo');
  }
}

// ============================================================
// ENCODE STATE TO PARAMS (for Edit in Builder link)
// ============================================================
function encodeStateToParams() {
  const params = new URLSearchParams();
  params.set('p', state.palette);
  params.set('a', state.accent);
  params.set('t', state.type);
  params.set('ar', state.art);
  params.set('m', state.motion);
  params.set('r', state.radius);
  params.set('s', state.spacing);
  params.set('i', state.icon);
  params.set('b', state.button);
  if (state.logo) {
    params.set('logo', state.logo);
  }
  return params.toString();
}

// ============================================================
// THEME
// ============================================================
function applyTheme() {
  const p = palettes[state.palette];
  const accentObj = p.accentOptions[state.accent] || p.accentOptions[0];
  const root = document.documentElement;

  root.style.setProperty('--bg', p.pageBg);
  root.style.setProperty('--surface', p.pageSurface);
  root.style.setProperty('--surface2', p.pageSurface2);
  root.style.setProperty('--border', p.pageBorder);
  root.style.setProperty('--text', p.pageText);
  root.style.setProperty('--text-dim', p.pageTextDim);
  root.style.setProperty('--text-muted', p.pageTextMuted);
  root.style.setProperty('--heading', p.pageHeading);
  root.style.setProperty('--accent', accentObj.value);
  root.style.setProperty('--accent-dark', accentObj.dark);

  const rad = radiusOptions[state.radius];
  const sp = spacingOptions[state.spacing];
  root.style.setProperty('--radius', rad.card);
  root.style.setProperty('--radius-btn', rad.btn);
  root.style.setProperty('--radius-icon', rad.icon);
  root.style.setProperty('--sp', sp.multiplier);
}

// ============================================================
// BUTTON STYLE RENDERING HELPER
// ============================================================
function renderBtn(text, accent, accentDark, darkBg, fontFamily, isPrimary) {
  const bs = buttonOptions[state.button].style;
  const rad = radiusOptions[state.radius].btn;
  let style = `font-family: ${fontFamily}; border-radius: ${rad};`;

  if (isPrimary) {
    switch (bs) {
      case 'filled':
        style += `background: ${accent}; color: ${darkBg}; border: none;`;
        break;
      case 'outlined':
        style += `background: transparent; color: ${accent}; border: 2px solid ${accent};`;
        break;
      case 'ghost':
        style += `background: transparent; color: ${accent}; border: none; text-decoration: underline; text-underline-offset: 3px;`;
        break;
      case 'gradient':
        style += `background: linear-gradient(135deg, ${accent}, ${accentDark}); color: ${darkBg}; border: none;`;
        break;
    }
    return `<div class="pbtn" style="${style}">${text}</div>`;
  } else {
    switch (bs) {
      case 'filled':
        style += `background: transparent; border: 1.5px solid ${accent}44; color: ${accent};`;
        break;
      case 'outlined':
        style += `background: transparent; border: 1.5px solid ${accent}; color: ${accent};`;
        break;
      case 'ghost':
        style += `background: transparent; border: none; color: ${accent}; opacity: 0.7;`;
        break;
      case 'gradient':
        style += `background: transparent; border: 1.5px solid ${accent}44; color: ${accent};`;
        break;
    }
    return `<div class="pbtn-outline" style="${style}">${text}</div>`;
  }
}

// ============================================================
// ICON STYLE RENDERING HELPER
// ============================================================
function renderIcon(size, accent, bgColor, fontFamily) {
  const iconStyle = iconOptions[state.icon].style;
  const rad = radiusOptions[state.radius].icon;
  const s = parseInt(size);

  if (iconStyle === 'outlined') {
    return `<div style="width: ${s}px; height: ${s}px; border-radius: ${rad}; border: 2px solid ${accent}; display: flex; align-items: center; justify-content: center;">
      <svg width="${s*0.45}" height="${s*0.45}" viewBox="0 0 24 24" fill="none" stroke="${accent}" stroke-width="2" stroke-linecap="round"><path d="M9 3H5a2 2 0 00-2 2v4m6-6h10a2 2 0 012 2v4M9 3v18m0 0h10a2 2 0 002-2V9M9 21H5a2 2 0 01-2-2V9m0 0h18"/></svg>
    </div>`;
  } else if (iconStyle === 'solid') {
    return `<div style="width: ${s}px; height: ${s}px; border-radius: ${rad}; background: ${accent}; color: ${bgColor}; display: flex; align-items: center; justify-content: center; font-family: ${fontFamily}; font-size: ${s*0.5}px; font-weight: 800;">G</div>`;
  } else {
    return `<div style="width: ${s}px; height: ${s}px; border-radius: ${rad}; background: ${accent}22; display: flex; align-items: center; justify-content: center;">
      <svg width="${s*0.45}" height="${s*0.45}" viewBox="0 0 24 24" fill="${accent}33" stroke="${accent}" stroke-width="2" stroke-linecap="round"><path d="M9 3H5a2 2 0 00-2 2v4m6-6h10a2 2 0 012 2v4M9 3v18m0 0h10a2 2 0 002-2V9M9 21H5a2 2 0 01-2-2V9m0 0h18"/></svg>
    </div>`;
  }
}

// ============================================================

  return `<img src="${state.logo}" style="max-height: ${maxH}px; max-width: 120px; width: auto; object-fit: contain;" alt="Logo" />`;
}
